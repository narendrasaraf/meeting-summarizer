name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Run database migrations
        run: alembic upgrade head
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
      - run: pytest -v
        env:
          OPENAI_API_KEY: test-key

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm run build

  deploy:
    name: Deploy to AWS EC2
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        env:
          EC2_HOST: ${{ secrets.AWS_EC2_HOST }}
          SSH_KEY: ${{ secrets.AWS_EC2_SSH_KEY }}
        run: |
          # 1. Create .ssh directory and write the private key
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          # 2. Add host key to known_hosts to prevent interactive prompting
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          # 3. Connect to the host, pull the latest code, and rebuild the containers
          ssh -i ~/.ssh/id_rsa ubuntu@$EC2_HOST "
            cd /home/ubuntu/meeting-summarizer && \
            git pull && \
            FRONTEND_PORT=80 docker compose up -d --build
          "

      - name: Verify service health
        env:
          LIVE_URL: ${{ secrets.LIVE_URL }}
        run: |
          echo "Starting health check against $LIVE_URL/api/health..."
          # Remove any trailing slash to avoid double-slash endpoints
          CLEAN_URL=$(echo "$LIVE_URL" | sed 's/\/$//')
          
          MAX_ATTEMPTS=6
          SLEEP_SECONDS=10
          
          for i in $(seq 1 $MAX_ATTEMPTS); do
            echo "Attempt $i/$MAX_ATTEMPTS: Curled endpoint..."
            if curl --fail --silent --show-error "$CLEAN_URL/api/health"; then
              echo ""
              echo "Health check PASSED! Application is serving traffic."
              exit 0
            fi
            echo "Service not ready yet. Sleeping $SLEEP_SECONDS seconds..."
            sleep $SLEEP_SECONDS
          done
          
          echo "Error: Health check failed after $MAX_ATTEMPTS attempts."
          exit 1

